name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Provision pinned tools
        uses: jdx/mise-action@v4
        with:
          install: true # runs `mise install`: shfmt + shellcheck before the tasks

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test
