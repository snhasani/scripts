name: security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # whole history, so gitleaks scans every commit — not just the push range
          persist-credentials: false

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false # keeps the token read-only; the job status + summary carry the signal
          # No GITLEAKS_LICENSE needed: gitleaks-action is free for personal and public repos; only orgs require a key.

  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: zizmor
        run: pipx run --spec 'zizmor>=1,<2' zizmor --min-severity=medium .
